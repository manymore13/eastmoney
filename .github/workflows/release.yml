name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送以v开头的tag时触发

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: eastmoney-report

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: eastmoney-report-windows-x64
          - os: macos-latest
            artifact_name: eastmoney-report-macos-universal
          - os: ubuntu-latest
            artifact_name: eastmoney-report-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Install dependencies (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --name ${{ matrix.artifact_name }} `
            --onedir `
            --windowed `
            --add-data "industry.json;." `
            --hidden-import PySide6.QtCore `
            --hidden-import PySide6.QtGui `
            --hidden-import PySide6.QtWidgets `
            --hidden-import requests `
            --hidden-import lxml `
            --clean `
            gui/main.py

      - name: Build application (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --name "${{ matrix.artifact_name }}" \
            --onedir \
            --windowed \
            --add-data "industry.json:." \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtWidgets \
            --hidden-import requests \
            --hidden-import lxml \
            --clean \
            gui/main.py

      - name: Build application (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --name "${{ matrix.artifact_name }}" \
            --onedir \
            --windowed \
            --add-data "industry.json:." \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --hidden-import PySide6.QtWidgets \
            --hidden-import requests \
            --hidden-import lxml \
            --clean \
            gui/main.py

      - name: Create artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}/*" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Create artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist/${{ matrix.artifact_name }}
          zip -r ../../${{ matrix.artifact_name }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
